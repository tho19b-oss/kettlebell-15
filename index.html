<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kettlebell 15 — 15-Minuten-Trainingsplan</title>
  <meta name="description" content="Dein 15-Minuten-Kettlebell-Trainingsplan für Muskelaufbau — Workout A (Kraft) und Workout B (Conditioning) im Wechsel.">
  <meta name="theme-color" content="#0B0B0D">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kettlebell 15">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app" class="app">
    <main id="main" class="main">
      <section id="screen-home" class="screen is-active" aria-label="Heute"></section>
      <section id="screen-progress" class="screen" aria-label="Fortschritt"></section>
      <section id="screen-guide" class="screen" aria-label="Guide"></section>
    </main>

    <nav class="tabbar" aria-label="Hauptnavigation">
      <button class="tab is-active" data-action="tab" data-tab="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
        <span>Heute</span>
      </button>
      <button class="tab" data-action="tab" data-tab="progress">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-7"/><path d="M22 20H2"/></svg>
        <span>Fortschritt</span>
      </button>
      <button class="tab" data-action="tab" data-tab="guide">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5v14z"/><path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20v-2.5"/></svg>
        <span>Guide</span>
      </button>
    </nav>

    <div id="overlay" class="overlay" hidden></div>
    <div id="modal" class="modal-layer" hidden></div>
  </div>

  <script src="js/timer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
